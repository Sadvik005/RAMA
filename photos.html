<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAMA Constellation | A Celestial Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff4d6d;
            --accent-glow: rgba(255, 77, 109, 0.6);
            --star-white: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            cursor: crosshair;
        }

        /* 🌌 Deep Space & Nebula */
        #galaxy-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .nebula {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 77, 109, 0.1) 0%, transparent 80%);
            z-index: -1;
            pointer-events: none;
        }

        /* 🚀 ROCKET LANDING ANIMATION */
        #landing-rocket {
            position: fixed;
            top: -150px;
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            font-size: 60px;
            z-index: 100;
            filter: drop-shadow(0 0 20px orange);
        }

        .rocket-landed {
            animation: landingMove 2.5s cubic-bezier(0.215, 0.610, 0.355, 1.000) forwards;
        }

        @keyframes landingMove {
            0% { top: -150px; opacity: 1; }
            80% { top: 70%; transform: translateX(-50%) rotate(180deg) scale(1.2); filter: drop-shadow(0 0 40px #fff); }
            100% { top: 85%; transform: translateX(-50%) rotate(180deg) scale(1); opacity: 0; }
        }

        /* 💥 Landing Effects */
        #landing-flash {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            z-index: 99;
            pointer-events: none;
        }

        .flash-active { animation: flashAnim 1.2s ease-out; }

        @keyframes flashAnim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .shake { animation: shakeAnim 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* ✨ CONSTELLATION NODES */
        #constellation-svg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 3s ease;
        }

        .constellation {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10;
            opacity: 0;
            transition: opacity 3s ease;
        }

        .show-content { opacity: 1 !important; }

        .star-node {
            position: absolute;
            width: 15px;
            height: 15px;
            background: var(--star-white);
            clip-path: polygon(50% 0%, 61% 39%, 100% 50%, 61% 61%, 50% 100%, 39% 61%, 0% 50%, 39% 39%);
            cursor: pointer;
            filter: drop-shadow(0 0 2px #fff) drop-shadow(0 0 10px var(--accent));
            animation: twinkle 3s infinite ease-in-out;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .star-node:hover {
            transform: scale(2.5) rotate(90deg);
            filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 20px var(--accent));
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 5px var(--accent)); }
            50% { transform: scale(1.3); filter: brightness(1.8) drop-shadow(0 0 15px var(--accent)); }
        }

        .constellation-line {
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 1;
            stroke-dasharray: 4;
            animation: lineFlow 10s linear infinite;
        }

        @keyframes lineFlow {
            from { stroke-dashoffset: 50; }
            to { stroke-dashoffset: 0; }
        }

        /* 🖼️ PHOTO OVERLAY (Premium Glass) */
        #photoOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(20px) saturate(160%);
            padding: 20px;
            transition: 0.5s;
        }

        #expandedImg {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 60px var(--accent-glow);
            object-fit: contain;
            transform: scale(0.9);
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        #photoOverlay.active { display: flex; }
        #photoOverlay.active #expandedImg { transform: scale(1); }

        /* 📝 UI ELEMENTS */
        .hint {
            position: fixed;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: white;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 200;
            opacity: 0;
            transition: 2s;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .star-node { width: 12px; height: 12px; }
            .hint { letter-spacing: 4px; font-size: 9px; }
        }
    </style>
</head>
<body onclick="closePhoto()">

    <div id="landing-flash"></div>
    <div id="landing-rocket">🚀</div>

    <canvas id="galaxy-canvas"></canvas>
    <div class="nebula"></div>
    
    <svg id="constellation-svg"></svg>
    <div class="constellation" id="constellation"></div>
    
    <div class="hint" id="hintText">Tap a star to explore the memory</div>

    <div id="photoOverlay">
        <img id="expandedImg" src="" alt="Memory">
    </div>

    <script>
        /** CANVAS ENGINE **/
        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const numStars = 500;
        let currentSpeed = 20; // High Warp
        let targetSpeed = 0.4; // Drift speed

        function initBG() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width - canvas.width / 2,
                    y: Math.random() * canvas.height - canvas.height / 2,
                    z: Math.random() * canvas.width,
                    o: Math.random()
                });
            }
        }

        function drawBG() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);

            if (currentSpeed > targetSpeed) currentSpeed -= 0.15;

            for (let i = 0; i < numStars; i++) {
                let s = stars[i];
                s.z -= currentSpeed;
                if (s.z <= 0) {
                    s.z = canvas.width;
                    s.x = Math.random() * canvas.width - canvas.width / 2;
                    s.y = Math.random() * canvas.height - canvas.height / 2;
                }
                let sx = (s.x / s.z) * canvas.width;
                let sy = (s.y / s.z) * canvas.height;
                let size = (1 - s.z / canvas.width) * (currentSpeed > 5 ? 4 : 2);
                
                ctx.fillStyle = `rgba(255, 255, 255, ${s.o})`;
                ctx.beginPath();
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
            requestAnimationFrame(drawBG);
        }

        /** DATA & COORDINATES **/
        const photos = [
            'Images/WhatsApp Image 2026-03-01 at 10.34.28.jpeg',
            'Images/WhatsApp Image 2026-02-26 at 14.06.41.jpeg',
            'Images/WhatsApp Image 2026-02-26 at 13.55.53.jpeg',
            'Images/WhatsApp Image 2026-02-26 at 13.45.48.jpeg',
            'Images/rama (1).jpeg', 'Images/rama (2).jpeg',
            'Images/rama (3).jpeg', 'Images/rama (4).jpeg',
            'Images/rama (5).jpeg', 'Images/rama (6).jpeg',
            'Images/rama (7).jpeg', 'Images/rama (8).jpeg',
            'Images/rama (9).jpeg', 'Images/rama (10).jpeg',
            'Images/rama (11).jpeg', 'Images/rama (12).jpeg',
            'Images/rama (13).jpeg', 'Images/rama (14).jpeg',
            'Images/rama (15).jpeg', 'Images/rama (16).jpeg',
            'Images/rama (17).jpeg'
        ];

        function getCoords() {
            const isMobile = window.innerWidth < 768;
            if (isMobile) {
                return {
                    'R': [[20,15], [20,35], [35,15], [40,20], [35,25], [20,25], [40,35]],
                    'A1': [[60,35], [70,15], [80,35], [65,27], [75,27]],
                    'M': [[20,70], [20,50], [35,62], [50,50], [50,70]],
                    'A2': [[65,70], [75,50], [85,70], [70,62], [80,62]]
                };
            }
            return {
                'R': [[10,40], [10,60], [10,40], [18,40], [22,50], [10,50], [22,60]],
                'A1':[[30,60], [38,40], [46,60], [34,53], [42,53]],
                'M': [[54,60], [54,40], [62,50], [70,40], [70,60]],
                'A2':[[78,60], [86,40], [94,60], [82,53], [90,53]]
            };
        }

        /** RENDER LOGIC **/
        function renderConstellation() {
            const container = document.getElementById('constellation');
            const svg = document.getElementById('constellation-svg');
            container.innerHTML = ''; svg.innerHTML = '';
            const coords = getCoords();
            let starCounter = 0; 

            Object.values(coords).forEach(path => {
                path.forEach((pos, i) => {
                    const star = document.createElement('div');
                    star.className = 'star-node';
                    star.style.left = pos[0] + '%';
                    star.style.top = pos[1] + '%';
                    star.style.animationDelay = (Math.random() * 2) + 's';

                    const photoToShow = photos[starCounter % photos.length];
                    starCounter++;

                    star.onclick = (e) => { 
                        e.stopPropagation(); 
                        openPhoto(photoToShow); 
                    };
                    container.appendChild(star);

                    if (i > 0) {
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("class", "constellation-line");
                        line.setAttribute("x1", path[i-1][0] + "%");
                        line.setAttribute("y1", path[i-1][1] + "%");
                        line.setAttribute("x2", pos[0] + "%");
                        line.setAttribute("y2", pos[1] + "%");
                        svg.appendChild(line);
                    }
                });
            });
        }

        function triggerLanding() {
            const rocket = document.getElementById('landing-rocket');
            const flash = document.getElementById('landing-flash');
            
            rocket.classList.add('rocket-landed');

            setTimeout(() => {
                flash.classList.add('flash-active');
                document.body.classList.add('shake');
                
                document.getElementById('constellation-svg').classList.add('show-content');
                document.getElementById('constellation').classList.add('show-content');
                document.getElementById('hintText').style.opacity = "0.7";
                
                setTimeout(() => {
                    rocket.style.display = 'none';
                    document.body.classList.remove('shake');
                }, 1000);
            }, 2000);
        }

        function openPhoto(src) {
            const img = document.getElementById('expandedImg');
            img.src = src;
            document.getElementById('photoOverlay').classList.add('active');
        }

        function closePhoto() { 
            document.getElementById('photoOverlay').classList.remove('active'); 
        }

        // Initialize Everything
        window.addEventListener('resize', () => { initBG(); renderConstellation(); });
        initBG();
        drawBG();
        renderConstellation();
        setTimeout(triggerLanding, 800);

        /** AUDIO CONTROLLER **/
        // Note: Browsers require a click to play audio. 
        // Clicking a star or anywhere will trigger it.
        const audio = new Audio("Indila_-_Love_Story_Piano_cover_(mp3.pm).mp3");
        audio.loop = true;

        document.body.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(e => console.log("Audio waiting for interaction"));
            }
        }, { once: false });

    </script>
</body>
</html>
