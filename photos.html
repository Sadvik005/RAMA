<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAMA Constellation | Landing Successful</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff4d6d;
            --star-glow: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* 🌌 Deep Space Background */
        #galaxy-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        /* ✨ Purple/Pink Nebula Glow */
        .nebula {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 77, 109, 0.08) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* 🚀 ROCKET LANDING ANIMATION */
        #landing-rocket {
            position: fixed;
            top: -150px;
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            font-size: 60px;
            z-index: 100;
            filter: drop-shadow(0 0 20px orange);
        }

        .rocket-landed {
            animation: landingMove 2.5s cubic-bezier(0.215, 0.610, 0.355, 1.000) forwards;
        }

        @keyframes landingMove {
            0% { top: -150px; opacity: 1; }
            80% { top: 70%; transform: translateX(-50%) rotate(180deg) scale(1.2); }
            100% { top: 85%; transform: translateX(-50%) rotate(180deg) scale(1); opacity: 0.8; }
        }

        /* 💨 Landing Smoke/Flash Effect */
        #landing-flash {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            z-index: 99;
            pointer-events: none;
        }

        .flash-active {
            animation: flashAnim 1s ease-out;
        }

        @keyframes flashAnim {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        /* 🫨 Screen Shake on Landing */
        .shake {
            animation: shakeAnim 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #constellation-svg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease-in;
        }

        .constellation {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10;
            opacity: 0;
            transition: opacity 2s ease-in;
        }

        .show-content { opacity: 1 !important; }

        .star-node {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fff;
            clip-path: polygon(50% 0%, 61% 39%, 100% 50%, 61% 61%, 50% 100%, 39% 61%, 0% 50%, 39% 39%);
            cursor: pointer;
            filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 10px var(--accent));
            animation: twinkle 3s infinite ease-in-out;
            touch-action: manipulation;
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(1.6); }
        }

        #photoOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(15px);
            padding: 20px;
        }

        #expandedImg {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 15px;
            box-shadow: 0 0 50px var(--accent);
            object-fit: contain;
        }

        #photoOverlay.active { display: flex; }

        .hint {
            position: fixed;
            bottom: 25px;
            width: 100%;
            text-align: center;
            color: white;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 10px;
            opacity: 0;
            transition: 1s;
        }
    </style>
</head>
<body onclick="closePhoto()">

    <div id="landing-flash"></div>
    <div id="landing-rocket">🚀</div>

    <canvas id="galaxy-canvas"></canvas>
    <div class="nebula"></div>
    <svg id="constellation-svg"></svg>
    <div class="constellation" id="constellation"></div>
    <div class="hint" id="hintText">Click a star to reveal magic</div>

    <div id="photoOverlay">
        <img id="expandedImg" src="">
    </div>

    <script>
        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const numStars = 600;
        let currentSpeed = 15; // Start at Warp Speed
        let targetSpeed = 0.5; // Landing speed

        function initBG() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width - canvas.width / 2,
                    y: Math.random() * canvas.height - canvas.height / 2,
                    z: Math.random() * canvas.width,
                    o: Math.random()
                });
            }
        }

        function drawBG() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);

            // Smoothly slow down the stars
            if (currentSpeed > targetSpeed) {
                currentSpeed -= 0.1;
            }

            for (let i = 0; i < numStars; i++) {
                let s = stars[i];
                s.z -= currentSpeed;
                if (s.z <= 0) {
                    s.z = canvas.width;
                    s.x = Math.random() * canvas.width - canvas.width / 2;
                    s.y = Math.random() * canvas.height - canvas.height / 2;
                }
                let sx = (s.x / s.z) * canvas.width;
                let sy = (s.y / s.z) * canvas.height;
                let size = (1 - s.z / canvas.width) * (currentSpeed > 5 ? 3 : 1.5);
                ctx.fillStyle = `rgba(255, 255, 255, ${s.o})`;
                ctx.beginPath();
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
            requestAnimationFrame(drawBG);
        }

        /** Landing Sequence Trigger **/
        function triggerLanding() {
            const rocket = document.getElementById('landing-rocket');
            const flash = document.getElementById('landing-flash');
            
            rocket.classList.add('rocket-landed');

            // Flash and Shake when rocket "hits" the bottom area
            setTimeout(() => {
                flash.classList.add('flash-active');
                document.body.classList.add('shake');
                
                // Show the constellation content
                document.getElementById('constellation-svg').classList.add('show-content');
                document.getElementById('constellation').classList.add('show-content');
                document.getElementById('hintText').style.opacity = "0.6";
                
                setTimeout(() => {
                    rocket.style.display = 'none';
                    document.body.classList.remove('shake');
                }, 1000);
            }, 2000);
        }

        const photos = [
            'WhatsApp Image 2026-03-01 at 10.34.28.jpeg',
            'WhatsApp Image 2026-02-26 at 14.06.41.jpeg',
            'WhatsApp Image 2026-02-26 at 13.55.53.jpeg',
            'WhatsApp Image 2026-02-26 at 13.45.48.jpeg',
            'rama (1).jpeg','rama (2).jpeg','rama (3).jpeg','rama (4).jpeg','rama (5).jpeg',
            'rama (6).jpeg','rama (7).jpeg','rama (8).jpeg','rama (9).jpeg','rama (10).jpeg',
            'rama (11).jpeg','rama (12).jpeg','rama (13).jpeg','rama (14).jpeg','rama (15).jpeg','rama (16).jpeg','rama (17).jpeg'
        ];

        const getCoords = () => {
            const isMobile = window.innerWidth < 768;
            return isMobile ? {
                'R': [[20,15], [20,35], [20,15], [40,15], [45,25], [20,25], [45,35]],
                'A1':[[60,35], [75,15], [90,35], [65,28], [85,28]],
                'M': [[15,80], [15,60], [32,75], [50,60], [50,80]],
                'A2':[[65,80], [80,60], [95,80], [70,73], [90,73]]
            } : {
                'R': [[10,40], [10,60], [10,40], [18,40], [22,50], [10,50], [22,60]],
                'A1':[[30,60], [38,40], [46,60], [34,53], [42,53]],
                'M': [[54,60], [54,40], [62,50], [70,40], [70,60]],
                'A2':[[78,60], [86,40], [94,60], [82,53], [90,53]]
            };
        };

        function renderConstellation() {
            const container = document.getElementById('constellation');
            const svg = document.getElementById('constellation-svg');
            container.innerHTML = ''; svg.innerHTML = '';
            const coords = getCoords();
            let starCounter = 0; 

            Object.values(coords).forEach(path => {
                path.forEach((pos, i) => {
                    const star = document.createElement('div');
                    star.className = 'star-node';
                    star.style.left = pos[0] + '%';
                    star.style.top = pos[1] + '%';
                    const photoToShow = photos[starCounter % photos.length];
                    starCounter++;
                    star.onclick = (e) => { e.stopPropagation(); openPhoto(photoToShow); };
                    container.appendChild(star);

                    if (i > 0) {
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("x1", path[i-1][0] + "%");
                        line.setAttribute("y1", path[i-1][1] + "%");
                        line.setAttribute("x2", pos[0] + "%");
                        line.setAttribute("y2", pos[1] + "%");
                        line.setAttribute("stroke", "rgba(255,255,255,0.15)");
                        line.setAttribute("stroke-dasharray", "3");
                        svg.appendChild(line);
                    }
                });
            });
        }

        function openPhoto(src) {
            const img = document.getElementById('expandedImg');
            img.src = src;
            document.getElementById('photoOverlay').classList.add('active');
        }

        function closePhoto() { document.getElementById('photoOverlay').classList.remove('active'); }

        window.addEventListener('resize', () => { initBG(); renderConstellation(); });

        // Start engines
        initBG();
        drawBG();
        renderConstellation();
        
        // Start landing sequence after 500ms
        setTimeout(triggerLanding, 500);
    </script>

<audio id="bgMusic" loop preload="auto">
    <source src="Indila_-_Love_Story_Piano_cover_(mp3.pm).mp3" type="audio/mpeg">
</audio>

<script>
    const music = document.getElementById("bgMusic");

    if (localStorage.getItem("musicAllowed") === "true") {

        const savedTime = localStorage.getItem("musicTime");
        if (savedTime) {
            music.currentTime = savedTime;
        }

        // Force autoplay properly
        music.play().catch(() => {
            document.addEventListener("click", () => {
                music.play();
            }, { once: true });
        });

        setInterval(() => {
            localStorage.setItem("musicTime", music.currentTime);
        }, 1000);
    }
</script>
    
</body>
</html>
