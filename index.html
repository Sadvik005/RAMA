<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Love Story | Restricted Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff4d6d;
            --gold: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* 🌌 GALAXY CANVAS */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 🚀 ROCKET ANIMATION */
        #rocket {
            position: fixed;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 80px;
            z-index: 100;
            display: none;
            filter: drop-shadow(0 0 20px #ffae00);
        }

        /* Launching keyframes */
        @keyframes launch {
            0% { bottom: -150px; transform: translateX(-50%) scale(1); }
            20% { bottom: 0px; transform: translateX(-50%) scale(1.1); }
            100% { bottom: 120vh; transform: translateX(-50%) scale(1.5); }
        }

        /* Flash effect on launch */
        #launch-flash {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            z-index: 99;
            pointer-events: none;
        }

        .flash-active {
            animation: flashAnim 0.8s ease-out;
        }

        @keyframes flashAnim {
            0% { opacity: 0.7; }
            100% { opacity: 0; }
        }

        /* 💎 GLASSMORPHISM CARD */
        .box {
            width: 90%;
            max-width: 400px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-style: italic;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--primary);
            margin-bottom: 40px;
            opacity: 0.8;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(45deg, var(--primary), #ff758c);
            color: white;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
        }

        #error {
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(255, 77, 109, 0.8);
            min-height: 20px;
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .floating-heart {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            opacity: 0.4;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>

<body>
    <div id="launch-flash"></div>
    <div id="rocket">🚀</div>
    <canvas id="starfield"></canvas>

    <div class="box" id="box">
        <h2>The Secret Story</h2>
        <p class="subtitle">Enter the Password</p>
        
        <div class="input-wrapper">
            <input type="password" id="pass" placeholder="Hint RAvi & MAnasa">
        </div>
        
        <button onclick="check()">Unlock Journey</button>
        <p id="error"></p>
    </div>

<script>
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let speed = 0.4; 
    const numStars = 500;

    // 🌌 STARFIELD
    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * canvas.width - canvas.width / 2,
                y: Math.random() * canvas.height - canvas.height / 2,
                z: Math.random() * canvas.width,
                o: Math.random()
            });
        }
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);

        for (let i = 0; i < numStars; i++) {
            let s = stars[i];
            s.z -= speed;
            if (s.z <= 0) s.z = canvas.width;

            let sx = (s.x / s.z) * canvas.width;
            let sy = (s.y / s.z) * canvas.height;
            let size = (1 - s.z / canvas.width) * 2.5;

            ctx.fillStyle = `rgba(255,255,255,${s.o})`;
            ctx.beginPath();
            ctx.arc(sx, sy, size, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.restore();
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', initStars);
    initStars();
    draw();

    // ❤️ FLOATING HEARTS
    function spawnHeart() {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = (Math.random() * 15 + 10) + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }
    setInterval(spawnHeart, 700);

    // 🚀 PASSWORD CHECK + MUSIC START
   function check() {
    const p = document.getElementById("pass").value;
    const box = document.getElementById("box");
    const err = document.getElementById("error");
    const rocket = document.getElementById("rocket");
    const flash = document.getElementById("launch-flash");
    const music = document.getElementById("bgMusic");

    if (p.trim().toLowerCase() === "rama") {

        // Save start flag
        localStorage.setItem("musicAllowed", "true");

        // Try play
        music.muted = false;
        music.play().then(() => {
            console.log("Music started");
        }).catch(err => {
            console.log("Autoplay blocked", err);
        });

        // Save time continuously
        setInterval(() => {
            localStorage.setItem("musicTime", music.currentTime);
        }, 1000);

        speed = 30;

        box.style.opacity = "0";
        box.style.transform = "translateY(100vh)";
        
        setTimeout(() => {
            window.location.href = "intro.html";
        }, 1500);

    } else {
        err.innerText = "Access Denied Hehe 😜";
        box.classList.add("shake");
        setTimeout(() => box.classList.remove("shake"), 400);
    }
}

    document.getElementById("pass").addEventListener("keyup", (e) => {
        if (e.key === "Enter") check();
    });
</script>

<audio id="bgMusic" loop preload="auto">
    <source src="Indila_-_Love_Story_Piano_cover_(mp3.pm).mp3" type="audio/mpeg">
</audio>
</body>
</html>
