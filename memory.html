<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Protocol: Ravi & Manasa | Celestial Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@200;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ravi-color: #00d2ff;
            --manasa-color: #ff2a6d; /* Deeper, more "cyber" pink */
            --star-gold: #ffcc33;
            --accent: #9d50bb; 
            --gold: #00f3ff;   /* Cyber Cyan */
            --glass: rgba(10, 10, 15, 0.75);
            --border: rgba(0, 243, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background: #020205;
            color: white;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        #galaxy-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            filter: blur(0.5px);
        }

        /* 🚀 THE REALISTIC ROCKET */
        #landing-rocket {
            position: fixed;
            top: -200px; 
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
            z-index: 100;
            filter: drop-shadow(0 0 20px var(--ravi-color)) drop-shadow(0 0 40px rgba(0,210,255,0.3));
            transition: top 3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .engine-glow {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 60px;
            background: linear-gradient(to bottom, var(--ravi-color), transparent);
            border-radius: 50%;
            filter: blur(8px);
            animation: flicker 0.08s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.8; height: 50px; transform: translateX(-50%) scale(0.9); }
            100% { opacity: 1; height: 70px; transform: translateX(-50%) scale(1.1); }
        }

        /* NEBULA EFFECTS */
        .nebula {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(157, 80, 187, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 42, 109, 0.1) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        #game-master {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* GLASSMORPHISM UI */
        .screen {
            display: none;
            max-width: 500px;
            width: 92%;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,243,255,0.05);
        }

        .screen.active { 
            display: block; 
            animation: cinematicIn 0.8s ease-out; 
        }

        @keyframes cinematicIn {
            from { opacity: 0; transform: translateY(30px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0deg); }
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 25px;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
        }

        #nav-game-container {
            width: 100%;
            height: 300px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        #ship {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            filter: drop-shadow(0 0 10px var(--gold));
            transition: transform 0.1s ease-out;
        }

        /* BUTTONS */
        .btn {
            background: linear-gradient(135deg, var(--gold), #0096ff);
            color: #000;
            border: none;
            padding: 16px 35px;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 3px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0, 243, 255, 0.2);
        }

        .btn:hover { 
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 243, 255, 0.4);
        }

        .option-btn {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ccc;
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            transition: 0.3s;
            text-align: left;
            font-size: 13px;
        }

        .option-btn:hover { 
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--gold);
            color: #fff;
            padding-left: 25px;
        }
    </style>
</head>
<body>

    <canvas id="galaxy-canvas"></canvas>
    <div class="nebula"></div>

    <div id="landing-rocket">
        🚀
        <div class="engine-glow"></div>
    </div>

    <div id="game-master">
        <div class="screen active" id="s-intro">
            <h1>Identity Check</h1>
            <p style="font-weight: 200; opacity: 0.8; font-size: 14px;">Syncing with Cloud Node: Ravi_Manasa_01</p>
            <div style="margin: 30px 0; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent);"></div>
            <button class="btn" onclick="nextScreen('s-nav')">Initiate Handshake</button>
        </div>

        <div class="screen" id="s-nav">
            <h1>Star Navigator</h1>
            <div id="progress-wrap" style="height:4px; background:rgba(255,255,255,0.1); border-radius:10px; margin-bottom:15px;">
                <div id="progress-bar" style="width:0%; height:100%; background:var(--manasa-color); box-shadow: 0 0 15px var(--manasa-color); transition:0.4s;"></div>
            </div>
            <div id="nav-game-container">
                <div id="ship">🚀</div>
            </div>
            <p style="font-size: 10px; color: var(--gold); letter-spacing: 2px;">COLLECT 5 SYNC-HEARTS TO DECRYPT</p>
        </div>

        <div class="screen" id="s-quiz">
            <h1>Verification Required</h1>
            <p id="q-text" style="font-size: 16px; margin-bottom: 25px;"></p>
            <div id="q-options"></div>
        </div>

        <div class="screen" id="s-final">
            <h1 style="color: #00ff88; text-shadow: 0 0 15px #00ff88;">Access Granted</h1>
            <p>Welcome home, Ravi & Manasa.</p>
            <br>
            <button class="btn" onclick="revealGallery()">Enter Vault</button>
        </div>
    </div>

    <div id="error-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; opacity:0; transition:0.4s;">
        <div class="screen" style="display:block; border-color: var(--manasa-color);">
            <h2 style="color:var(--manasa-color); font-family:'Syncopate'; font-size:14px;">SYNC ERROR</h2>
            <p style="margin: 20px 0;">Coordinate mismatch detected.</p>
            <button class="btn" onclick="closeErrorModal()" style="background:var(--manasa-color);">Re-attempt</button>
        </div>
    </div>

    <script>
        // 🌌 REALISTIC STARFIELD PHYSICS
        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let speed = 15; 

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 800; i++) {
                stars.push({
                    x: Math.random() * canvas.width - canvas.width / 2,
                    y: Math.random() * canvas.height - canvas.height / 2,
                    z: Math.random() * canvas.width,
                    size: Math.random() * 1.5,
                    color: i % 10 === 0 ? '#ff2a6d' : (i % 15 === 0 ? '#00d2ff' : '#ffffff')
                });
            }
        }

        function drawStars() {
            ctx.fillStyle = "#020205";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            
            stars.forEach(s => {
                s.z -= speed;
                if (s.z <= 0) s.z = canvas.width;
                
                let sx = (s.x / s.z) * canvas.width;
                let sy = (s.y / s.z) * canvas.height;
                let screenScale = (1 - s.z / canvas.width);
                let r = screenScale * 2.5;

                ctx.beginPath();
                ctx.arc(sx, sy, r, 0, Math.PI * 2);
                ctx.fillStyle = s.color;
                ctx.globalAlpha = screenScale;
                ctx.fill();
            });
            ctx.restore();
            requestAnimationFrame(drawStars);
        }

        // 🎬 CINEMATIC ENTRY
        window.onload = () => {
            initStars();
            drawStars();
            const rocket = document.getElementById('landing-rocket');
            const UI = document.getElementById('game-master');

            setTimeout(() => { rocket.style.top = "15%"; }, 800);
            
            // Deceleration effect
            setTimeout(() => {
                const decel = setInterval(() => {
                    if (speed > 0.8) speed -= 0.3;
                    else clearInterval(decel);
                }, 40);
            }, 1500);

            setTimeout(() => { UI.style.opacity = "1"; }, 3000);
        };

        // UI NAVIGATION
        function nextScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 's-nav') { speed = 5; runGame(); }
            if(id === 's-quiz') { speed = 1.5; runQuiz(); }
        }

        // IMPROVED GAME LOGIC
        function runGame() {
            const container = document.getElementById('nav-game-container');
            const ship = document.getElementById('ship');
            const bar = document.getElementById('progress-bar');
            let score = 0;
            let active = true;

            const moveShip = (e) => {
                let rect = container.getBoundingClientRect();
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let x = clientX - rect.left;
                let pos = Math.max(30, Math.min(x, rect.width - 30));
                ship.style.left = pos + 'px';
                // Add a slight tilt
                let tilt = (pos - (rect.width/2)) / 10;
                ship.style.transform = `translateX(-50%) rotate(${tilt}deg)`;
            };
            
            container.addEventListener('mousemove', moveShip);
            container.addEventListener('touchmove', moveShip);

            const gameLoop = setInterval(() => {
                if(!active) return;
                const h = document.createElement('div');
                h.style.position = 'absolute';
                h.style.top = '-40px';
                h.style.left = Math.random() * (container.offsetWidth - 40) + 20 + 'px';
                h.style.fontSize = '24px';
                h.style.filter = 'drop-shadow(0 0 10px #ff2a6d)';
                h.innerHTML = '❤️';
                container.appendChild(h);

                let fallPos = 0;
                const fall = setInterval(() => {
                    fallPos += 5;
                    h.style.top = fallPos + 'px';
                    
                    let sRect = ship.getBoundingClientRect();
                    let hRect = h.getBoundingClientRect();

                    if(hRect.bottom > sRect.top && hRect.right > sRect.left && hRect.left < sRect.right) {
                        score++;
                        bar.style.width = (score * 20) + '%';
                        h.remove();
                        clearInterval(fall);
                        if(score >= 5) {
                            active = false;
                            clearInterval(gameLoop);
                            setTimeout(() => nextScreen('s-quiz'), 800);
                        }
                    }
                    if(fallPos > 320) { h.remove(); clearInterval(fall); }
                }, 20);
            }, 1000);
        }

        // QUIZ DATA
        const quizData = [
            { q: "What was Ravi's first thought when he met Manasa?", a: ["She's the one!", "She's definitely going to argue with me.", "Wait, do I have enough storage for all her selfies?"], correct: 2 },
            { q: "What is Manasa’s most dangerous weapon?", a: ["Her silent treatment", "Her 'We need to talk' text", "Her cooking experiments"], correct: 2 },
            { q: "Ravi’s survival strategy when Manasa is 'hangry' is:", a: ["Apply logic and reasoning (Failed)", "Offer chocolate and back away slowly", "Pretend to be a statue"], correct: 1 },
            { q: "Her pappu daal color palette is:", a: ["Yellow", "Golden", "Midnight black limited edition"], correct: 2 },
            { q: "If her cooking had a movie title, it would be:", a: ["Fast & Furious: Kitchen Drift", "Mission Impossible: Eat This", "The Dark Daal Rises"], correct: 2 },
            { q: "Final verdict on Manasa’s food:", a: ["Sometimes smoky 😅", "Always made with love ❤️", "Forever family favorite"], correct: 1 },
            {
  q: "Okay Manu… who is your favorite? 👀",
  a: ["Butta 😌", "Swetha 🌸", "Ravi 😎"],
  correct: 2
}
        ];
        
        let qIdx = 0;
        function runQuiz() {
            const data = quizData[qIdx];
            document.getElementById('q-text').innerText = data.q;
            const holder = document.getElementById('q-options');
            holder.innerHTML = '';
            
            data.a.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = opt;
                b.onclick = () => {
                    if(i === data.correct) {
                        qIdx++;
                        if(qIdx < quizData.length) runQuiz();
                        else nextScreen('s-final');
                    } else {
                        showError();
                    }
                };
                holder.appendChild(b);
            });
        }

        function showError() {
            const modal = document.getElementById('error-modal');
            modal.style.display = 'flex';
            setTimeout(() => { modal.style.opacity = '1'; }, 10);
        }

        function closeErrorModal() {
            const modal = document.getElementById('error-modal');
            modal.style.opacity = '0';
            setTimeout(() => { modal.style.display = 'none'; }, 400);
        }

        function revealGallery() {
            speed = 80;
            document.body.style.filter = 'brightness(2) white-out';
            document.body.style.transition = '2s';
            document.body.style.background = 'white';
            setTimeout(() => { window.location.href = 'gallery.html'; }, 1500);
        }

        window.addEventListener('resize', initStars);
    </script>

<audio id="bgMusic" loop preload="auto">
    <source src="Indila_-_Love_Story_Piano_cover_(mp3.pm).mp3" type="audio/mpeg">
</audio>

<script>
    const music = document.getElementById("bgMusic");

    if (localStorage.getItem("musicAllowed") === "true") {

        const savedTime = localStorage.getItem("musicTime");
        if (savedTime) {
            music.currentTime = savedTime;
        }

        // Force autoplay properly
        music.play().catch(() => {
            document.addEventListener("click", () => {
                music.play();
            }, { once: true });
        });

        setInterval(() => {
            localStorage.setItem("musicTime", music.currentTime);
        }, 1000);
    }
</script>
    
</body>
</html>
