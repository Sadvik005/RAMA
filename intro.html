<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A Love Story ❤️ | Mobile Optimized</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ravi-blue: #00d2ff;
            --manasa-pink: #ff2a6d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

        body {
            margin: 0;
            background: #000105;
            color: white;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #galaxy-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        /* 🚀 ROCKET */
        #cruise-rocket {
            position: fixed;
            font-size: clamp(40px, 12vw, 60px);
            z-index: 5;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            filter: drop-shadow(0 0 20px var(--ravi-blue));
            animation: spaceFloat 5s infinite ease-in-out;
            transition: all 2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        @keyframes spaceFloat {
            0%, 100% { transform: translateX(-50%) translateY(0) rotate(3deg); }
            50% { transform: translateX(-50%) translateY(-15px) rotate(-3deg); }
        }

        /* ✨ VIBRANT SOUL STARS */
        .soul-star {
            position: fixed;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            z-index: 25;
            opacity: 0;
            pointer-events: none;
            filter: blur(0.5px);
        }

        /* The blue dot for Ravi */
        #star-ravi { 
            background: var(--ravi-blue); 
            box-shadow: 0 0 15px #fff, 0 0 30px var(--ravi-blue), 0 0 60px var(--ravi-blue); 
        }
        
        /* The pink dot for Manasa */
        #star-manasa { 
            background: var(--manasa-pink); 
            box-shadow: 0 0 15px #fff, 0 0 30px var(--manasa-pink), 0 0 60px var(--manasa-pink); 
        }

        /* 🎬 TEXT & NAMES */
        .line {
            opacity: 0;
            font-size: clamp(0.8rem, 4vw, 1.1rem);
            margin: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 200;
            transition: 2s ease;
            width: 90%;
        }

        .show { opacity: 0.8; transform: scale(1.05); letter-spacing: 6px; }

        .name-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: clamp(10px, 5vw, 30px);
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.2rem, 12vw, 5.5rem);
            margin: 20px 0;
            z-index: 10;
            width: 100%;
        }

        .intro-name {
            opacity: 0;
            filter: blur(15px);
            transition: 2.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        #name-ravi { color: var(--ravi-blue); text-shadow: 0 0 20px var(--ravi-blue); }
        #name-manasa { color: var(--manasa-pink); text-shadow: 0 0 20px var(--manasa-pink); }

        .reveal-name { opacity: 1 !important; filter: blur(0) !important; }

        #heart-icon {
            opacity: 0;
            transform: scale(0);
            transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .heart-pop { opacity: 1 !important; transform: scale(1) !important; animation: beat 0.8s infinite alternate; }

        @keyframes beat { to { transform: scale(1.2); } }

        #flash {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="flash"></div>
    <canvas id="galaxy-canvas"></canvas>

    <div id="star-ravi" class="soul-star"></div>
    <div id="star-manasa" class="soul-star"></div>

    <div id="cruise-rocket">🚀<div class="engine-glow"></div></div>

    <div class="line" id="l1">Beyond the stars...</div>
    <div class="line" id="l2">A destiny was written.</div>

    <div class="name-container">
        <span id="name-ravi" class="intro-name">Ravi</span>
        <span id="heart-icon">❤️</span>
        <span id="name-manasa" class="intro-name">Manasa</span>
    </div>

    <div class="line" id="l3">Two hearts, One Universe.</div>

    <script>
        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let speed = 0.5;
        let warp = false;

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            const count = window.innerWidth < 500 ? 400 : 800;
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width - canvas.width / 2,
                    y: Math.random() * canvas.height - canvas.height / 2,
                    z: Math.random() * canvas.width,
                    size: Math.random() * 1.5,
                    color: i % 8 === 0 ? '#ff2a6d' : (i % 5 === 0 ? '#00d2ff' : '#fff')
                });
            }
        }

        function draw() {
            ctx.fillStyle = warp ? "rgba(0,0,5,0.2)" : "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);

            stars.forEach(s => {
                s.z -= speed;
                if (s.z <= 0) s.z = canvas.width;
                let sx = (s.x / s.z) * canvas.width;
                let sy = (s.y / s.z) * canvas.height;
                let size = (1 - s.z / canvas.width) * 2.5;

                ctx.beginPath();
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fillStyle = s.color;
                ctx.globalAlpha = (1 - s.z / canvas.width);
                ctx.fill();

                if (warp) {
                    ctx.strokeStyle = s.color;
                    ctx.lineWidth = size;
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(sx * 1.1, sy * 1.1);
                    ctx.stroke();
                }
            });
            ctx.restore();
            requestAnimationFrame(draw);
        }

        function runSequence() {
            const sRavi = document.getElementById('star-ravi');
            const sManasa = document.getElementById('star-manasa');
            const flash = document.getElementById('flash');
            
            // Set start to center with 0 scale
            [sRavi, sManasa].forEach(s => {
                s.style.opacity = "1";
                s.style.left = "50%";
                s.style.top = "50%";
                s.style.transform = "translate(-50%, -50%) scale(0)";
            });

            setTimeout(() => {
                const rectR = document.getElementById('name-ravi').getBoundingClientRect();
                const rectM = document.getElementById('name-manasa').getBoundingClientRect();

                // Smooth cinematic glide
                sRavi.style.transition = "all 3.2s cubic-bezier(0.19, 1, 0.22, 1)";
                sManasa.style.transition = "all 3.2s cubic-bezier(0.19, 1, 0.22, 1)";

                // Move Ravi's Blue Star
                sRavi.style.left = (rectR.left + rectR.width/2) + "px";
                sRavi.style.top = (rectR.top + rectR.height/2) + "px";
                sRavi.style.transform = "translate(-50%, -50%) scale(2.5)";

                // Move Manasa's Pink Star
                sManasa.style.left = (rectM.left + rectM.width/2) + "px";
                sManasa.style.top = (rectM.top + rectM.height/2) + "px";
                sManasa.style.transform = "translate(-50%, -50%) scale(2.5)";
            }, 100);

            // Impact Reveal
            setTimeout(() => {
                flash.style.opacity = "0.7";
                setTimeout(() => flash.style.opacity = "0", 150);
                
                document.getElementById('name-ravi').classList.add('reveal-name');
                document.getElementById('name-manasa').classList.add('reveal-name');
                
                // Stars dissolve into the names
                [sRavi, sManasa].forEach(s => {
                    s.style.transform = "translate(-50%, -50%) scale(6)";
                    s.style.opacity = "0";
                    s.style.transition = "all 0.8s ease-out";
                });
            }, 3200);
        }

        window.onload = () => {
            initStars();
            draw();
            
            setTimeout(() => document.getElementById("l1").classList.add("show"), 1000);
            setTimeout(() => {
                document.getElementById("l1").classList.remove("show");
                document.getElementById("l2").classList.add("show");
            }, 4000);

            setTimeout(() => {
                document.getElementById("l2").classList.remove("show");
                runSequence();
            }, 7000);

            setTimeout(() => document.getElementById("heart-icon").classList.add("heart-pop"), 10500);
            setTimeout(() => document.getElementById("l3").classList.add("show"), 12000);

            setTimeout(() => {
                warp = true;
                speed = 28;
                document.getElementById("cruise-rocket").style.top = "-20%";
                document.getElementById("cruise-rocket").style.transform = "translateX(-50%) scale(0.1)";
                setTimeout(() => {
                    document.body.style.opacity = "0";
                    document.body.style.transition = "1.5s";
                    setTimeout(() => window.location.href = "memory.html", 1500);
                }, 2000);
            }, 15000);
        };

        window.addEventListener('resize', initStars);
    </script>
<audio id="bgMusic" loop preload="auto">
    <source src="Indila_-_Love_Story_Piano_cover_(mp3.pm).mp3" type="audio/mpeg">
</audio>

<script>
    const music = document.getElementById("bgMusic");

    if (localStorage.getItem("musicAllowed") === "true") {

        const savedTime = localStorage.getItem("musicTime");
        if (savedTime) {
            music.currentTime = savedTime;
        }

        // Force autoplay properly
        music.play().catch(() => {
            document.addEventListener("click", () => {
                music.play();
            }, { once: true });
        });

        setInterval(() => {
            localStorage.setItem("musicTime", music.currentTime);
        }, 1000);
    }
</script>
</body>
</html>
