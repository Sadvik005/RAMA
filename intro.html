<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A Love Story ❤️ | Intro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ravi-blue: #00d2ff;
            --manasa-pink: #ff2a6d;
            --star-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0;
            background: #000205;
            color: white;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 🌌 Realistic Deep Space Canvas */
        #galaxy-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%);
        }

        /* 🚀 CINEMATIC ROCKET */
        #cruise-rocket {
            position: fixed;
            font-size: 55px;
            z-index: 5;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            filter: drop-shadow(0 0 25px rgba(0, 210, 255, 0.6));
            animation: spaceBob 5s infinite ease-in-out;
            transition: all 2s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }

        @keyframes spaceBob {
            0%, 100% { transform: translateX(-50%) translateY(0) rotate(2deg); }
            50% { transform: translateX(-50%) translateY(-15px) rotate(-2deg); }
        }

        .engine-glow {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 45px;
            background: linear-gradient(to bottom, var(--ravi-blue), transparent);
            border-radius: 50%;
            filter: blur(5px);
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            from { opacity: 0.5; height: 40px; }
            to { opacity: 1; height: 55px; }
        }

        /* ✨ THE TWO SOUL STARS */
        .soul-star {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            z-index: 20;
            opacity: 0;
            filter: blur(2px);
            box-shadow: 0 0 20px 5px white;
        }

        #star-ravi { background: var(--ravi-blue); box-shadow: 0 0 30px var(--ravi-blue); }
        #star-manasa { background: var(--manasa-pink); box-shadow: 0 0 30px var(--manasa-pink); }

        /* Cinematic Text */
.line {
    opacity: 0;
   font-size: clamp(0.9rem, 4.5vw, 1.25rem);
    margin: 10px 0;
    letter-spacing: clamp(1px, 1vw, 5px);
    text-transform: uppercase;
    font-weight: 200;
    transition: all 2s ease;
    z-index: 10;
    max-width: 90%;
}

        .show {
    opacity: 0.8;
    transform: scale(1.02);
    letter-spacing: clamp(2px, 1.5vw, 6px);
}

        .name-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3rem, 12vw, 5rem);
            margin: 30px 0;
            z-index: 10;
        }

        .intro-name {
            opacity: 0;
            filter: blur(15px);
            transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #name-ravi { color: var(--ravi-blue); text-shadow: 0 0 30px var(--ravi-blue); }
        #name-manasa { color: var(--manasa-pink); text-shadow: 0 0 30px var(--manasa-pink); }

        .reveal-name { opacity: 1 !important; filter: blur(0) !important; }

        #heart-icon {
            opacity: 0;
            transform: scale(0);
            transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 15px var(--manasa-pink));
        }

        .heart-pop { opacity: 1 !important; transform: scale(1.2) !important; animation: beat 0.8s infinite alternate; }

        @keyframes beat {
            to { transform: scale(1.4); }
        }

        /* Final Warp */
        .warp-speed {
            filter: brightness(2) contrast(1.2);
            transition: 2s;
        }

        @media (max-width: 768px) {

    body {
        padding: 15px;
    }

    .line {
        font-size: 0.8rem;
        letter-spacing: 2px;
    }

    .name-container {
        font-size: clamp(2.2rem, 10vw, 3rem);
        gap: 10px;
        margin: 20px 0;
    }

    #heart-icon {
        font-size: 1.5rem;
    }

    #cruise-rocket {
        font-size: 40px;
        top: 8%;
    }
}

    
    </style>
</head>

<body>
    <canvas id="galaxy-canvas"></canvas>

    <div id="star-ravi" class="soul-star"></div>
    <div id="star-manasa" class="soul-star"></div>

    <div id="cruise-rocket">
        🚀
        <div class="engine-glow"></div>
    </div>

<div class="line" id="l1">In a world of billions... 🌍</div>
    <div class="line" id="l2">Two souls found each other... 💫</div>

    <div class="name-container">
        <span id="name-ravi" class="intro-name">Ravi</span>
        <span id="heart-icon">❤️</span>
        <span id="name-manasa" class="intro-name">Manasa</span>
    </div>

    <div class="line" id="l3">A promise was made... 💍</div>
    <div class="line" id="l4">A journey began... ✨</div>


    <script>
        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let speed = 0.4;
        let warp = false;

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 800; i++) {
                stars.push({
                    x: Math.random() * canvas.width - canvas.width / 2,
                    y: Math.random() * canvas.height - canvas.height / 2,
                    z: Math.random() * canvas.width,
                    size: Math.random() * 1.5,
                    color: Math.random() > 0.9 ? '#ff2a6d' : '#00d2ff'
                });
            }
        }

        function drawStars() {
            ctx.fillStyle = warp ? "rgba(0, 0, 0, 0.2)" : "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);

            stars.forEach(s => {
                s.z -= speed;
                if (s.z <= 0) s.z = canvas.width;

                let sx = (s.x / s.z) * canvas.width;
                let sy = (s.y / s.z) * canvas.height;
                let size = (1 - s.z / canvas.width) * 3;

                ctx.beginPath();
                ctx.arc(sx, sy, warp ? size * 0.5 : size, 0, Math.PI * 2);
                ctx.fillStyle = s.color;
                ctx.globalAlpha = (1 - s.z / canvas.width);
                ctx.fill();

                if (warp) { // Draw light trails
                    ctx.strokeStyle = s.color;
                    ctx.lineWidth = size;
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(sx * 1.1, sy * 1.1);
                    ctx.stroke();
                }
            });
            ctx.restore();
            requestAnimationFrame(drawStars);
        }

        function flySoulStars() {
            const sRavi = document.getElementById('star-ravi');
            const sManasa = document.getElementById('star-manasa');
            const nRavi = document.getElementById('name-ravi').getBoundingClientRect();
            const nManasa = document.getElementById('name-manasa').getBoundingClientRect();

            // Set start position (deep center)
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            [sRavi, sManasa].forEach(s => {
                s.style.opacity = "1";
                s.style.left = centerX + "px";
                s.style.top = centerY + "px";
                s.style.transform = "scale(0)";
                s.style.transition = "all 3s cubic-bezier(0.19, 1, 0.22, 1)";
            });

            setTimeout(() => {
                // Fly to Ravi Name
                sRavi.style.left = (nRavi.left + nRavi.width / 2) + "px";
                sRavi.style.top = (nRavi.top + nRavi.height / 2) + "px";
                sRavi.style.transform = "scale(3)";
                
                // Fly to Manasa Name
                sManasa.style.left = (nManasa.left + nManasa.width / 2) + "px";
                sManasa.style.top = (nManasa.top + nManasa.height / 2) + "px";
                sManasa.style.transform = "scale(3)";
            }, 100);

            // Impact effect
            setTimeout(() => {
                [sRavi, sManasa].forEach(s => {
                    s.style.transform = "scale(10)";
                    s.style.opacity = "0";
                    s.style.filter = "blur(20px)";
                });
                document.getElementById("name-ravi").classList.add("reveal-name");
                document.getElementById("name-manasa").classList.add("reveal-name");
            }, 2800);
        }

        window.addEventListener('resize', initStars);
        initStars();
        drawStars();

        window.onload = () => {
            // Sequence
            setTimeout(() => document.getElementById("l1").classList.add("show"), 1000);
            setTimeout(() => {
                document.getElementById("l1").classList.remove("show");
                document.getElementById("l2").classList.add("show");
            }, 4000);

            // Soul Stars Revelation
            setTimeout(() => {
                document.getElementById("l2").classList.remove("show");
                flySoulStars();
            }, 7000);

            // Heart Reveal
            setTimeout(() => { 
                document.getElementById("heart-icon").classList.add("heart-pop"); 
            }, 10500);

           // Show l3
setTimeout(() => {
    document.getElementById("l3").classList.add("show");
}, 12000);

// Hide l3 and show l4
setTimeout(() => {
    document.getElementById("l3").classList.remove("show");
    document.getElementById("l4").classList.add("show");
}, 14000);

            // Cinematic Exit
            setTimeout(() => {
                warp = true;
                speed = 25;
                document.body.classList.add("warp-speed");
                document.getElementById("cruise-rocket").style.top = "120%";
                document.getElementById("cruise-rocket").style.left = "50%";
            }, 16000);

            setTimeout(() => {
                document.body.style.opacity = "0";
                document.body.style.transition = "2s";
                setTimeout(() => { window.location.href = "memory.html"; }, 1800);
            }, 17000);
        };
    </script>

    <audio id="bgMusic" loop preload="auto">
    <source src="Indila_-_Love_Story_Piano_cover_(mp3.pm).mp3" type="audio/mpeg">
</audio>

<script>
    const music = document.getElementById("bgMusic");

    if (localStorage.getItem("musicAllowed") === "true") {

        const savedTime = localStorage.getItem("musicTime");
        if (savedTime) {
            music.currentTime = savedTime;
        }

        // Force autoplay properly
        music.play().catch(() => {
            document.addEventListener("click", () => {
                music.play();
            }, { once: true });
        });

        setInterval(() => {
            localStorage.setItem("musicTime", music.currentTime);
        }, 1000);
    }
</script>
</body>
</html>
